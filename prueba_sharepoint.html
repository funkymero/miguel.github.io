<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TestMant</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background:#f7f7f7; }
    h1 { margin-bottom: 10px; }
    #estado { margin-bottom: 15px; font-weight: bold; }
    table { border-collapse: collapse; width: 100%; background:#fff; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; font-size: 14px; }
    th { background: #eaeaea; }
  </style>
</head>
<body>
  <h1>Dashboard Mantenciones</h1>
  <div id="estado">Conectando...</div>

  <table>
    <thead>
      <tr>
        <th>ID_UNICO</th>
        <th>Tipo_Equipo</th>
        <th>Marca</th>
        <th>Modelo</th>
        <th>Tipo</th>
        <th>Semana</th>
        <th>Fecha_Mantencion</th>
        <th>Proxima_Mantencion</th>
        <th>Responsable</th>
      </tr>
    </thead>
    <tbody id="tablaBody"></tbody>
  </table>

 <script src="https://alcdn.msauth.net/browser/2.38.1/js/msal-browser.min.js"></script>

<script>
const msalConfig = {
  auth: {
    clientId: "b035be0f-afe4-4141-81c6-88cf7a1b5ccf",
    authority: "https://login.microsoftonline.com/1b16ab3e-b8f6-4fe3-9f3e-2db7fe549f6a",
    redirectUri: "https://funkymero.github.io/miguel.github.io/prueba_sharepoint.html"
  },
  cache: {
    cacheLocation: "localStorage"
  }
};

const msalInstance = new msal.PublicClientApplication(msalConfig);

const loginRequest = {
  scopes: ["User.Read", "Sites.Read.All"]
};

async function getToken() {
  let account = msalInstance.getAllAccounts()[0];

  if (!account) {
    const loginResponse = await msalInstance.loginPopup(loginRequest);
    account = loginResponse.account;
  }

  try {
    const tokenResponse = await msalInstance.acquireTokenSilent({
      ...loginRequest,
      account
    });
    return tokenResponse.accessToken;
  } catch (e) {
    const tokenResponse = await msalInstance.acquireTokenPopup(loginRequest);
    return tokenResponse.accessToken;
  }
}

async function testGraph() {
  const estado = document.getElementById("estado");

  try {
    estado.textContent = "Autenticando...";
    const token = await getToken();

    estado.textContent = "Consultando Graph (/me)...";

    const meResp = await fetch("https://graph.microsoft.com/v1.0/me", {
      headers: {
        Authorization: `Bearer ${token}`
      }
    });

    const meData = await meResp.json();
    console.log("Usuario:", meData);

    estado.textContent = "Buscando sitio SharePoint...";

    const siteResp = await fetch(
      "https://graph.microsoft.com/v1.0/sites/hexmet-my.sharepoint.com:/personal/miguel_pasten_hexagon_com",
      {
        headers: {
          Authorization: `Bearer ${token}`
        }
      }
    );

    const siteData = await siteResp.json();
    console.log("Sitio:", siteData);

    estado.textContent = "OK: login + Graph funcionando 🚀 (revisa consola)";
  } catch (err) {
    estado.textContent = "Error: " + err.message;
    console.error(err);
  }
}

testGraph();
</script>
</body>
</html>
